{{ define "main" }}

<header>
  {{ if .Title }}
    <h1>{{ .Title }}</h1>
  {{ end }}

  {{ with .Description }}
    <div>{{ . }}</div>
  {{ end }}
</header>

{{ range .Pages.ByDate.Reverse }}
<article style="margin-bottom:2rem;">
    <h2>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>

    <small>
        {{ .Date.Format "2 January 2006" }}
    </small>

    {{ with .Summary }}
    <p>{{ . }}</p>
    {{ end }}
</article>
{{ end }}

{{ end }}
