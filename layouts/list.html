{{ define "main" }}

<header class="mb-8">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}
        <p>{{ . }}</p>
    {{ end }}
</header>

{{ range .Pages.ByDate.Reverse }}
<article style="margin-bottom:40px">

<h2>
<a href="{{ .RelPermalink }}">{{ .Title }}</a>
</h2>

<p style="color:#777">
{{ .Date.Format "2 January 2006" }}
</p>

<p>
{{ .Summary | plainify | truncate 220 }}
</p>

<p>
<a href="{{ .RelPermalink }}">Читать полностью →</a>
</p>

</article>
{{ end }}

{{ end }}
